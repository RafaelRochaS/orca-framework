# =============================================================================
# 5G Research Lab — Docker Compose
# Components: Open5GS 5GC · OCUDU gNB/UE (ZMQ) · ETSI OpenOP (CAMARA)
#
# O-RAN SC Near-RT RIC runs via its own docker-compose.yml in repos/oran-sc-ric/
# and communicates with the gNB over the shared "ran" network.
#
# Usage: ./lab.sh up   (preferred — handles startup ordering)
#        docker compose up -d   (manual)
# =============================================================================

networks:
  # Core network: 5GC NFs talk to each other and to the gNB via N2/N3
  core:
    driver: bridge
    ipam:
      config:
        - subnet: 10.53.1.0/24

  # RAN network: gNB ↔ RIC (E2), gNB ↔ UE (ZMQ), shared with oran-sc-ric compose
  ran:
    name: lab_ran          # explicit name so oran-sc-ric can reference it externally
    driver: bridge
    ipam:
      config:
        - subnet: 10.53.2.0/24

  # OOP network: CAMARA API layer talks to 5GC NEF/PCF and to the outside
  oop:
    driver: bridge
    ipam:
      config:
        - subnet: 10.53.3.0/24

volumes:
  mongodb_data:
  open5gs_config:
  grafana_data:

# =============================================================================
# 1. DATABASE — MongoDB (required by Open5GS for subscriber DB and NF config)
# =============================================================================
services:
  mongodb:
    image: mongo:6.0
    container_name: lab_mongodb
    restart: unless-stopped
    networks:
      core:
        ipv4_address: 10.53.1.10
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  # =============================================================================
  # 2. OPEN5GS — 5G Core Network Functions
  #    Uses the Gradiant Open5GS image, which is the same one used in the official
  #    OCUDU k8s tutorials. Bundles all NFs in a single container.
  #    WebUI default credentials: admin / 1423
  #    Note: The OCUDU docker-compose uses AMF IP 10.53.1.2 by convention —
  #    we honour that here so configs/gnb_zmq.yaml stays consistent.
  # =============================================================================
  open5gs:
    image: gradiant/open5gs:2.2.0
    container_name: lab_open5gs
    restart: unless-stopped
    privileged: true          # required for TUN device (UPF)
    cap_add:
      - NET_ADMIN
    networks:
      core:
        ipv4_address: 10.53.1.2     # matches OCUDU's own docker-compose convention
      ran:
        ipv4_address: 10.53.2.20    # gNB N2/N3 connectivity
      oop:
        ipv4_address: 10.53.3.20    # OOP southbound (NEF/PCF)
    ports:
      - "9999:9999"           # Open5GS WebUI
      - "38412:38412/sctp"    # N2 — NGAP (AMF) — exposed for debugging
    volumes:
      - ./config/open5gs/open5gs.yaml:/opt/open5gs/etc/open5gs/open5gs.yaml:ro
      - ./config/open5gs/subscriber_db.csv:/opt/open5gs/subscriber_db.csv:ro
    environment:
      MONGODB_IP: "10.53.1.10"
      OPEN5GS_IP: "10.53.1.2"
      AMF_IP: "10.53.1.2"           # gNB AMF_ADDR must match this
      UPF_ADVERTISED_IP: "10.53.1.2"
      SUBSCRIBER_DB: "/opt/open5gs/subscriber_db.csv"
      UE_IP_BASE: "10.45.0"         # UE IP pool
      DEBUG: "false"
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 38412 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  # =============================================================================
  # 3. OCUDU gNB — NG-RAN base station (ZMQ RF, E2 agent for RIC)
  # =============================================================================
  ocudu-gnb:
    build:
      context: ./repos/ocudu
      dockerfile: docker/Dockerfile
      args:
        # CRITICAL: ZMQ support must be enabled at compile time.
        # Without this the binary will only list "uhd" as available radio type
        # and will fail with "Factory for radio type zmq not found".
        EXTRA_CMAKE_ARGS: "-DENABLE_EXPORT=ON -DENABLE_ZEROMQ=ON"
        OS_VERSION: "24.04"
    image: lab_ocudu_gnb:latest
    container_name: lab_gnb
    restart: unless-stopped
    privileged: true
    cap_add:
      - SYS_NICE           # real-time scheduling for radio threads
      - NET_ADMIN
    networks:
      core:
        ipv4_address: 10.53.1.30    # needs core network to reach AMF at 10.53.1.2
      ran:
        ipv4_address: 10.53.2.30
    volumes:
      - ./config/ocudu/gnb_zmq.yaml:/config/gnb.yaml:ro
    environment:
      AMF_ADDR: "10.53.1.2"         # Open5GS AMF — matches gradiant/open5gs convention
      RIC_ADDR: "10.53.2.100"       # O-RAN SC RIC E2 termination
    command: gnb -c /config/gnb.yaml
    depends_on:
      open5gs:
        condition: service_healthy
    # Note: The gNB will retry E2 connection — RIC startup lag is acceptable

  # =============================================================================
  # 4. OCUDU UE — ZMQ-based UE simulator (optional, started via ./lab.sh ue)
  # =============================================================================
  ocudu-ue:
    build:
      context: ./repos/ocudu-4g
      dockerfile: docker/Dockerfile
      args:
        OS_VERSION: "24.04"
    image: lab_ocudu_ue:latest
    container_name: lab_ue
    restart: "no"            # start manually via lab.sh ue
    privileged: true
    cap_add:
      - NET_ADMIN
    networks:
      ran:
        ipv4_address: 10.53.2.40
    volumes:
      - ./config/ocudu/ue_zmq.conf:/config/ue.conf:ro
    command: >
      srsue /config/ue.conf
    profiles:
      - ue                   # only started when explicitly requested

  # =============================================================================
  # 5. ETSI OpenOP — Open Exposure Gateway (northbound CAMARA API exposure)
  #    Built from the upstream repo: labs.etsi.org/rep/oop/code/open-exposure-gateway
  #    Connexion/Flask app on port 8080 — Swagger UI at /docs/
  # =============================================================================
  oop-gateway:
    build:
      context: ./repos/openop/open-exposure-gateway
      dockerfile: Dockerfile
    image: lab_oop_gateway:latest
    container_name: lab_oop_gateway
    restart: unless-stopped
    networks:
      oop:
        ipv4_address: 10.53.3.30
      core:
        ipv4_address: 10.53.1.30
    ports:
      - "8080:8080"           # CAMARA API northbound (HTTP)
    environment:
      MONGO_URI: "mongodb://10.53.1.10:27017"           # shared MongoDB instance
      SRM_HOST: "http://10.53.3.40:8090/srm/1.0.0"     # OOP Orchestrator (SRM role)
      FEDERATION_MANAGER_HOST: ""                        # not used in lab
      TOKEN_ENDPOINT: ""                                 # not used in lab
      PARTNER_API_ROOT: ""                               # not used in lab
    depends_on:
      mongodb:
        condition: service_healthy
      open5gs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/docs/"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  # =============================================================================
  # 6. ETSI OpenOP — Service Orchestrator (CAMARA → 5GC/RAN translation)
  # =============================================================================
  oop-orchestrator:
    build:
      context: ./oop/orchestrator
      dockerfile: Dockerfile
    image: lab_oop_orchestrator:latest
    container_name: lab_oop_orchestrator
    restart: unless-stopped
    networks:
      oop:
        ipv4_address: 10.53.3.40
      core:
        ipv4_address: 10.53.1.40
      ran:
        ipv4_address: 10.53.2.50
    ports:
      - "8090:8090"           # Orchestrator management API
    volumes:
      - ./config/oop/orchestrator.yaml:/app/config/orchestrator.yaml:ro
    environment:
      OPEN5GS_PCF_URL: "http://10.53.3.20:7000"
      OPEN5GS_SMF_URL: "http://10.53.3.20:7001"
      RIC_A1_URL: "http://10.53.2.100:10000"  # A1 interface to Near-RT RIC
      LOG_LEVEL: "INFO"
    depends_on:
      - oop-gateway

  # =============================================================================
  # 7. GRAFANA — Observability dashboard for RAN/core metrics
  # =============================================================================
  grafana:
    image: grafana/grafana:10.4.0
    container_name: lab_grafana
    restart: unless-stopped
    networks:
      core:
        ipv4_address: 10.53.1.50
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
