# =============================================================================
# OCUDU — gNB Configuration (ZMQ RF, E2 agent enabled)
# PLMN: 00101 | Band n3 (1800MHz) | ZMQ transport to srsUE
# =============================================================================

gnb_id: 1041
gnb_id_bit_length: 22
ran_node_name: srsgnb01

cu_cp:
  amf:
    addrs: 10.53.1.2
    bind_addrs: 10.53.1.30
    supported_tracking_areas:
      - tac: 7
        plmn_list:
          - plmn: "00101"
            tai_slice_support_list:
              - sst: 1
              - sst: 2

ru_sdr:
  device_driver: zmq
  device_args: "tx_port=tcp://*:2000,rx_port=tcp://10.53.2.40:2001,id=gnb,base_srate=23.04e6,tx_freq=1842.5e6,rx_freq=1747.5e6"
  srate: 23.04
  tx_gain: 80
  rx_gain: 40

cell_cfg:
  dl_arfcn: 368500
  band: 3
  channel_bandwidth_MHz: 20
  common_scs: 15
  plmn: "00101"
  tac: 7
  pci: 1
  pdcch:
    dedicated:
      ss2_type: common
      dci_format_0_1_and_1_1: false
    common:
      ss0_index: 0
      coreset0_index: 12
  prach:
    prach_config_index: 1
  pdsch:
    mcs_table: qam64
  pusch:
    mcs_table: qam64

e2:
  enable_du_e2: false
  enable_cu_cp_e2: false
  enable_cu_up_e2: false
  addrs: 10.53.2.100
  port: 36421
  bind_addrs: 10.53.2.30
  e2sm_kpm_enabled: true
  e2sm_rc_enabled: true

log:
  all_level: info
  filename: /dev/stdout
