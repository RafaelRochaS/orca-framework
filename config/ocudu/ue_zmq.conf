# =============================================================================
# srsUE Configuration — ZMQ RF (connects to OCUDU gNB via TCP sockets)
# Subscriber: IMSI 001010123456780 — must be registered in Open5GS
# =============================================================================

[rf]
freq_offset = 0
tx_gain = 50
rx_gain = 40
srate = 11.52e6
nof_antennas = 1

# ZMQ RF device — mirrors the gNB ZMQ config (tx↔rx swapped)
device_name = zmq
# UE TX (uplink) binds; gNB RX connects to it.
# UE RX (downlink) connects to gNB's TX socket.
device_args = tx_port=tcp://*:2001,rx_port=tcp://10.53.2.30:2000,base_srate=11.52e6

[rat.eutra]
dl_earfcn = 2850
nof_carriers = 0

[rat.nr]
bands = 3
nof_carriers = 1

[pcap]
enable = none

[log]
all_level = warning
rf_level = error
filename = /dev/stdout

[usim]
mode = soft
algo = milenage
opc  = 63BFA50EE6523365FF14C1F45F88737D
k    = 00112233445566778899AABBCCDDEEFF
imsi = 001010123456780
imei = 353490069873310

[rrc]
release = 15
ue_category = 4

[nas]
apn = internet
apn_protocol = ipv4

[gw]
netns = ue1            # UE runs in its own network namespace for clean routing
ip_devname = tun_srsue
ip_netmask = 255.255.0.0

[gui]
enable = false
