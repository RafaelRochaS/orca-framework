# =============================================================================
# Open5GS 5G Core Configuration
# Lab environment — single-host, ZMQ gNB via Docker network
# =============================================================================

logger:
  file: /dev/stdout
  level: info

global:
  max:
    ue: 1024
    peer: 64

# =============================================================================
# Network Repository Function (NRF)
# =============================================================================
nrf:
  serving:
    - plmn_id:
        mcc: "001"
        mnc: "01"
  sbi:
    server:
      - address: 127.0.0.10
        port: 7777

# =============================================================================
# Access and Mobility Management Function (AMF)
# =============================================================================
amf:
  sbi:
    server:
      - address: 10.53.1.2
        port: 7777
    client:
      nrf:
        - uri: http://127.0.0.10:7777

  ngap:
    server:
      - address: ${AMF_IP:-10.53.1.2}   # gNB connects here (N2/NGAP over SCTP)

  metrics:
    server:
      - address: 10.53.1.2
        port: 9090

  guami:
    - plmn_id:
        mcc: "001"
        mnc: "01"
      amf_id:
        region: 2
        set: 1

  tai:
    - plmn_id:
        mcc: "001"
        mnc: "01"
      tac: 7

  plmn_support:
    - plmn_id:
        mcc: "001"
        mnc: "01"
      s_nssai:
        - sst: 1            # eMBB slice (default)
        - sst: 2            # URLLC slice (for QoD research)

  security:
    integrity_order: [NIA2, NIA1, NIA0]
    ciphering_order: [NEA0, NEA2, NEA1]

  network_name:
    full: "5G Research Lab"
    short: "5GLAB"

  amf_name: open5gs-amf0

# =============================================================================
# Session Management Function (SMF)
# =============================================================================
smf:
  sbi:
    server:
      - address: 127.0.0.4
        port: 7777
    client:
      nrf:
        - uri: http://127.0.0.10:7777
      scp:
        - uri: http://127.0.0.200:7777

  pfcp:
    server:
      - address: 127.0.0.4
    client:
      upf:
        - address: 127.0.0.7

  gtpc:
    server:
      - address: 127.0.0.4

  gtpu:
    server:
      - address: 127.0.0.4

  metrics:
    server:
      - address: 127.0.0.4
        port: 9090

  session:
    - subnet: 10.45.0.0/16   # UE IP pool
      gateway: 10.45.0.1
    - subnet: 2001:db8:cafe::/48

  dns:
    - 8.8.8.8
    - 8.8.4.4
    - 2001:4860:4860::8888

  mtu: 1400  # slightly below Ethernet MTU to accommodate GTP-U encapsulation

  freeDiameter: /opt/open5gs/etc/freeDiameter/smf.conf

# =============================================================================
# User Plane Function (UPF)
# =============================================================================
upf:
  pfcp:
    server:
      - address: 127.0.0.7
    client:
      smf:
        - address: 127.0.0.4

  gtpu:
    server:
      - address: 127.0.0.7

  session:
    - subnet: 10.45.0.0/16
    - subnet: 2001:db8:cafe::/48

  metrics:
    server:
      - address: 127.0.0.7
        port: 9090

# =============================================================================
# Unified Data Management (UDM)
# =============================================================================
udm:
  hnet:
    - id: 1
      scheme: 1
      key: b8c06bb6af12f3c36dba43d5a2d34e2b
  sbi:
    server:
      - address: 127.0.0.12
        port: 7777
    client:
      nrf:
        - uri: http://127.0.0.10:7777

# =============================================================================
# Unified Data Repository (UDR)
# =============================================================================
udr:
  sbi:
    server:
      - address: 127.0.0.20
        port: 7777
    client:
      nrf:
        - uri: http://127.0.0.10:7777

# =============================================================================
# Authentication Server Function (AUSF)
# =============================================================================
ausf:
  sbi:
    server:
      - address: 127.0.0.11
        port: 7777
    client:
      nrf:
        - uri: http://127.0.0.10:7777

# =============================================================================
# Policy Control Function (PCF)
# Required by CAMARA QoD API for QoS policy enforcement
# =============================================================================
pcf:
  sbi:
    server:
      - address: 127.0.0.13
        port: 7777
    client:
      nrf:
        - uri: http://127.0.0.10:7777
  metrics:
    server:
      - address: 127.0.0.13
        port: 9090

# =============================================================================
# Network Slice Selection Function (NSSF)
# =============================================================================
nssf:
  sbi:
    server:
      - address: 127.0.0.14
        port: 7777
    client:
      nrf:
        - uri: http://127.0.0.10:7777
      nsi:
        - uri: http://127.0.0.10:7777
          s_nssai:
            sst: 1
        - uri: http://127.0.0.10:7777
          s_nssai:
            sst: 2

# =============================================================================
# Binding Support Function (BSF)
# =============================================================================
bsf:
  sbi:
    server:
      - address: 127.0.0.15
        port: 7777
    client:
      nrf:
        - uri: http://127.0.0.10:7777

# =============================================================================
# Network Exposure Function (NEF)
# Key for CAMARA API southbound — OOP communicates with 5GC through NEF
# =============================================================================
nef:
  sbi:
    server:
      - address: 10.53.1.2
        port: 7777
    client:
      nrf:
        - uri: http://127.0.0.10:7777
